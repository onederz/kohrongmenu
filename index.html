<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Menu Display | Scroll Snap Images</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff5df;
      overflow-x: hidden;
    }

    /* MAIN CONTAINER: VERTICAL SCROLL SNAP */
    .menu-scroll-container {
      height: 100vh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: #c0a06b #fff5df;
    }

    .menu-scroll-container::-webkit-scrollbar {
      width: 8px;
    }
    .menu-scroll-container::-webkit-scrollbar-track {
      background: #fff5df;
      border-radius: 8px;
    }
    .menu-scroll-container::-webkit-scrollbar-thumb {
      background: #c0a06b;
      border-radius: 8px;
    }

    /* EACH SECTION = FULL VIEWPORT SNAP */
    .menu-section {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f12;
      padding: 1rem;
      position: relative;
    }

    /* IMAGE CONTAINER - full A4 portrait style */
    .menu-image-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff5df;
      border-radius: 24px;
      overflow: hidden;
    }

    .menu-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff5df;
    }

    /* page number marker - clean and minimal */
    .page-marker {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #f5e7ce;
      font-family: monospace;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
      border: 1px solid rgba(255,215,120,0.3);
    }

    /* scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 40px;
      color: #e9d6b0;
      font-size: 0.7rem;
      font-weight: 500;
      z-index: 10;
      font-family: monospace;
      pointer-events: none;
    }

    /* responsive: for very tall screens or mobile */
    @media (max-width: 768px) {
      .menu-section {
        padding: 0.5rem;
      }
      .page-marker {
        bottom: 1rem;
        right: 1rem;
        font-size: 0.7rem;
        padding: 0.3rem 0.8rem;
      }
      .scroll-hint {
        font-size: 0.6rem;
        bottom: 12px;
        left: 12px;
      }
    }

  </style>
</head>

<script>
  (function() {
    // Ensure scroll-snap remains stable after images load (prevents layout shift)
    const container = document.getElementById('scrollContainer');
    let isScrolling = false;
    
    // optional: maintain snap integrity on resize or heavy images load
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (container) {
          const currentPos = container.scrollTop;
          // tiny nudget to re-engage snap
          container.scrollTop = currentPos + 1;
          setTimeout(() => { container.scrollTop = currentPos; }, 30);
        }
      }, 200);
    });

    // subtle active section visual feedback (light border around active image)
    const sections = document.querySelectorAll('.menu-section');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const wrapper = entry.target.querySelector('.menu-image-wrapper');
        if (wrapper) {
          if (entry.isIntersecting) {
          } else {
            wrapper.style.boxShadow = '';
          }
        }
      });
    }, { threshold: 0.6 });
    
    sections.forEach(section => observer.observe(section));
  })();
</script>
